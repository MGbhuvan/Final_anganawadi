<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attendance - Poshan Abhiyan</title>
    <link href="static/fonts.css" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple:     #A855F7;
            --deep-purple:#7C3AED;
            --saffron:    #FF6B00;
            --green:      #138808;
            --navy:       #141e30;
            --white:      #FFFFFF;
            --red:        #A32D2D;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: #f4f6fb;
        }

        .topbar {
            background: linear-gradient(135deg, var(--navy) 0%, #2d1b4e 100%);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 3px 16px rgba(0,0,0,0.18);
        }

        .topbar-left { display: flex; align-items: center; gap: 1rem; }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.75); text-decoration: none;
            font-size: 0.82rem; font-weight: 700;
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem; font-weight: 700; color: var(--white);
        }

        .topbar-right {
            font-size: 0.72rem; color: rgba(255,255,255,0.38);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        .tricolor {
            height: 4px;
            background: linear-gradient(90deg,
                var(--saffron) 0% 33%,
                var(--white)   33% 66%,
                var(--purple)  66% 100%
            );
        }

        .page {
            max-width: 1050px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem; margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--white); border-radius: 16px;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-top: 4px solid var(--purple);
            position: relative; overflow: hidden;
        }

        .stat-card::after {
            content: ''; position: absolute;
            right: -10px; top: -10px;
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(168,85,247,0.07);
        }

        .stat-card.green { border-top-color: var(--green); }
        .stat-card.green::after { background: rgba(19,136,8,0.07); }
        .stat-card.red   { border-top-color: #E24B4A; }
        .stat-card.red::after { background: rgba(226,75,74,0.07); }
        .stat-card.amber { border-top-color: #F5A623; }
        .stat-card.amber::after { background: rgba(245,166,35,0.07); }

        .stat-label {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: #9CA3AF; margin-bottom: 0.5rem;
        }

        .stat-val {
            font-size: 2rem; font-weight: 800;
            color: var(--navy); line-height: 1;
        }

        /* ADD CARD */
        .add-card {
            background: var(--white); border-radius: 18px;
            padding: 1.6rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            margin-bottom: 1.5rem;
            border: 1.5px solid #f3eeff;
        }

        .add-card-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
            margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 10px;
        }

        .add-card-title::before {
            content: ''; display: inline-block;
            width: 5px; height: 22px;
            background: linear-gradient(180deg, var(--purple), var(--deep-purple));
            border-radius: 3px;
        }

        .add-fields {
            display: flex; gap: 1rem;
            align-items: flex-end; flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .add-field {
            display: flex; flex-direction: column; gap: 5px;
            flex: 1; min-width: 140px;
        }

        .add-field label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280;
        }

        .add-field input {
            padding: 9px 12px;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); background: #FAFAFA;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-field input:focus {
            border-color: var(--purple); background: var(--white);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.10);
        }

        /* STUD ID prefix wrapper */
        .id-wrapper {
            display: flex; align-items: center;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            background: #FAFAFA; overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .id-wrapper:focus-within {
            border-color: var(--purple); background: var(--white);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.10);
        }

        .id-prefix {
            padding: 9px 10px 9px 12px;
            font-size: 0.88rem; font-weight: 800;
            color: #581C87; background: #F3E8FF;
            border-right: 1.5px solid #E5E7EB;
            white-space: nowrap; user-select: none;
        }

        .id-wrapper input {
            border: none; border-radius: 0;
            background: transparent; box-shadow: none !important;
            flex: 1;
        }

        .date-wrap {
            display: flex; align-items: center; gap: 10px;
            background: #faf8ff; border: 1.5px solid #ede9fe;
            border-radius: 10px; padding: 9px 14px;
            flex: 1; min-width: 180px;
        }

        .date-wrap label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280; white-space: nowrap;
        }

        .date-wrap input {
            border: none; background: transparent;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); outline: none;
        }

        .add-btn-wrap { display: flex; justify-content: center; }

        .add-student-btn {
            padding: 10px 40px;
            background: linear-gradient(135deg, var(--purple), var(--deep-purple));
            color: var(--white); border: none; border-radius: 12px;
            font-size: 0.92rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            box-shadow: 0 4px 14px rgba(168,85,247,0.30);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .add-student-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168,85,247,0.40);
        }

        .add-msg {
            display: none; margin-top: 1rem;
            padding: 9px 14px; border-radius: 9px;
            font-size: 0.8rem; font-weight: 700; text-align: center;
        }

        .add-msg.success { display:block; background:#EAF3DE; color:#27500A; border:1px solid #C0DD97; }
        .add-msg.error   { display:block; background:#FCEBEB; color:#791F1F; border:1px solid #F7C1C1; }

        /* TABLE */
        .table-card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow: hidden;
        }

        .table-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.1rem 1.6rem; border-bottom: 1px solid #F3F4F6;
            flex-wrap: wrap; gap: 0.8rem;
        }

        .table-toolbar-title { font-size: 1.12rem; font-weight: 800; color: var(--navy); }

        .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .filter-row { display: flex; gap: 6px; }

        .filter-btn {
            font-size: 0.72rem; padding: 4px 13px; border-radius: 20px;
            cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700;
            border: 1.5px solid #E5E7EB; background: var(--white); color: #6B7280;
        }

        .filter-btn.active { background: var(--purple); color: var(--white); border-color: var(--purple); }

        .date-badge {
            font-size: 0.75rem; font-weight: 700;
            color: #581C87; background: #F3E8FF;
            padding: 4px 12px; border-radius: 20px;
        }

        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 1.11rem; }

        thead tr { background: linear-gradient(135deg, var(--navy) 0%, #2d1b4e 100%); }

        thead th {
            color: rgba(255,255,255,0.85);
            font-size: 0.91rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 13px 15px; text-align: left; white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #F9FAFB;
            transition: background 0.15s;
            animation: rowIn 0.3s ease;
        }

        @keyframes rowIn {
            from { opacity:0; transform:translateX(-8px); }
            to   { opacity:1; transform:translateX(0); }
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #faf8ff; }

        tbody td { padding: 12px 15px; font-size: 1.09rem; color: #374151; vertical-align: middle; }

        .stu-id {
            display: inline-block; padding: 3px 9px;
            background: #F3E8FF; color: #581C87;
            border-radius: 6px; font-size: 0.75rem; font-weight: 700;
        }

        .stu-name { font-weight: 700; color: var(--navy); }

        .att-btns { display: flex; gap: 6px; }

        .att-btn {
            padding: 5px 12px; border-radius: 7px;
            font-size: 0.78rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            border: 1.5px solid transparent; transition: all 0.18s;
        }

        .att-btn.pre { background: #EAF3DE; color: #27500A; border-color: #C0DD97; }
        .att-btn.abs { background: #FCEBEB; color: #791F1F; border-color: #F7C1C1; }

        .att-btn.pre.active { background: var(--green); color: var(--white); border-color: var(--green); }
        .att-btn.abs.active { background: #E24B4A; color: var(--white); border-color: #E24B4A; }

        .table-card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }

        .table-toolbar {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.6rem;
            border-bottom: 1px solid #F3F4F6;
            flex-wrap: wrap; gap: 0.8rem;
        }

        tbody td {
            padding: 12px 15px;
            color: #374151; vertical-align: middle;
        }

        /* Action Menu */
        .action-cell {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .menu-btn {
            background: #F3F4F6; border: 1.5px solid #E5E7EB;
            font-size: 1.1rem; cursor: pointer;
            color: #6B7280; width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .menu-btn:hover { background: #E5E7EB; color: var(--navy); border-color: #D1D5DB; }

        .action-menu {
            display: none;
            position: absolute;
            right: 15px; top: 100%;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #E5E7EB;
            min-width: 140px;
            z-index: 1000;
            overflow: hidden;
            margin-top: 5px;
            animation: menuIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .action-menu button {
            display: flex; align-items: center; gap: 8px;
            width: 100%; padding: 10px 16px; background: none; border: none;
            font-size: 0.82rem; font-weight: 700; font-family: 'Nunito', sans-serif;
            cursor: pointer; text-align: left; transition: background 0.15s;
        }

        .action-menu button.update-opt { color: #0C447C; }
        .action-menu button.update-opt:hover { background: #E6F1FB; }
        .action-menu button.delete-opt { color: var(--red); }
        .action-menu button.delete-opt:hover { background: #FCEBEB; }

        @keyframes menuIn {
            from { opacity:0; transform:translateY(-6px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .fixed-toast {
            display: none; position: fixed; bottom: 28px; right: 28px;
            padding: 12px 22px; border-radius: 12px; font-size: 0.84rem; font-weight: 700;
            color: var(--white); z-index: 9999; box-shadow: 0 6px 24px rgba(0,0,0,0.18);
        }

        /* ── TABS ──────────────────────────────────────────────── */
        .view-tabs {
            display: flex; gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .view-tab {
            padding: 9px 24px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            border: 2px solid #E5E7EB; background: var(--white);
            color: #6B7280; transition: all 0.2s;
        }
        .view-tab.active {
            background: linear-gradient(135deg, var(--purple), var(--deep-purple));
            color: var(--white); border-color: var(--deep-purple);
            box-shadow: 0 4px 14px rgba(168,85,247,0.30);
        }

        /* ── MONTHLY PANEL ─────────────────────────────────────── */
        #monthlyPanel { display: none; }
        #dailyPanel   { display: block; }

        .monthly-controls {
            background: var(--white); border-radius: 18px;
            padding: 1.4rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            margin-bottom: 1.5rem;
            border: 1.5px solid #f3eeff;
            display: flex; align-items: flex-end; gap: 1.2rem; flex-wrap: wrap;
        }
        .monthly-controls label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280; display: block; margin-bottom: 5px;
        }
        .monthly-controls input[type=month] {
            padding: 9px 14px;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); background: #FAFAFA; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .monthly-controls input[type=month]:focus {
            border-color: var(--purple); background: var(--white);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.10);
        }
        .monthly-load-btn {
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--purple), var(--deep-purple));
            color: var(--white); border: none; border-radius: 12px;
            font-size: 0.88rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            box-shadow: 0 4px 14px rgba(168,85,247,0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .monthly-load-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168,85,247,0.40); }

        .monthly-table-card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow: hidden;
        }
        .monthly-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.1rem 1.6rem; border-bottom: 1px solid #F3F4F6;
            flex-wrap: wrap; gap: 0.8rem;
        }
        .monthly-toolbar-title { font-size: 1.12rem; font-weight: 800; color: var(--navy); }
        .monthly-wrap { overflow-x: auto; max-width: 100%; }
        .monthly-wrap table {
            border-collapse: collapse;
            font-size: 0.97rem;
            min-width: 600px;
        }
        .monthly-wrap thead tr {
            background: linear-gradient(135deg, var(--navy) 0%, #2d1b4e 100%);
        }
        .monthly-wrap thead th {
            color: rgba(255,255,255,0.85);
            font-size: 0.89rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 10px 6px; text-align: center; white-space: nowrap;
        }
        .monthly-wrap thead th.col-name {
            text-align: left; padding-left: 14px; min-width: 160px;
        }
        .monthly-wrap thead th.col-id { min-width: 70px; }
        .monthly-wrap thead th.col-total { min-width: 50px; }
        .monthly-wrap tbody tr { border-bottom: 1px solid #F3F4F6; }
        .monthly-wrap tbody tr:hover { background: #faf8ff; }
        .monthly-wrap tbody td {
            padding: 8px 6px; text-align: center;
            color: #374151; vertical-align: middle;
        }
        .monthly-wrap tbody td.col-name {
            text-align: left; padding-left: 14px;
            font-weight: 700; color: var(--navy); white-space: nowrap;
        }
        .monthly-wrap tbody td.col-id {
            font-size: 0.93rem; font-weight: 700;
            color: #581C87;
        }
        .monthly-wrap tbody td.col-total {
            font-weight: 800; color: var(--deep-purple);
        }
        .cell-p  { color: #138808; font-weight: 800; }
        .cell-a  { color: #E24B4A; font-weight: 800; }
        .cell-nm { color: #9CA3AF; font-size: 0.62rem; }
        .cell-h  { color: #C084FC; font-size: 0.68rem; }

        .monthly-empty { padding: 3rem 2rem; text-align: center; color: #9CA3AF;
            font-size: 0.9rem; font-weight: 700; }

        @media (max-width: 900px) {
            .topbar { height: auto; padding: 0.75rem 1rem; flex-direction: column; gap: 0.5rem; }
            .topbar-left { width: 100%; flex-wrap: wrap; }
            .table-toolbar, .toolbar-right { gap: 0.5rem; flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 700px) {
            .stats-row  { grid-template-columns: 1fr 1fr; }
            .add-fields { flex-direction: column; }
            .date-wrap { width: 100%; }
            .page { padding: 1rem 1rem 3rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="home.html" class="back-btn">&#8592; Home</a>
        <div class="topbar-title">Attendance</div>
    </div>
    <div class="topbar-right">Poshan Abhiyan</div>
</div>
<div class="tricolor"></div>

<div class="fixed-toast" id="fixedToast"></div>


<div class="page">

    <!-- Tab switcher -->
    <div class="view-tabs">
        <button class="view-tab active" id="tabDaily"   onclick="switchTab('daily')">📅 Daily Attendance</button>
        <button class="view-tab"        id="tabMonthly" onclick="switchTab('monthly')">📊 Monthly View</button>
    </div>

    <!-- ── DAILY PANEL ── -->
    <div id="dailyPanel">
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Students</div>
            <div class="stat-val" id="sTotal">0</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Present</div>
            <div class="stat-val" id="sPresent">0</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Absent</div>
            <div class="stat-val" id="sAbsent">0</div>
        </div>
        <div class="stat-card amber">
            <div class="stat-label">Attendance %</div>
            <div class="stat-val" id="sPct">0%</div>
        </div>
    </div>

    <div class="add-card">
        <div class="add-card-title">Generate Attendance List</div>

        <div class="add-fields">
            <div class="date-wrap" style="flex: 1;">
                <label>Date</label>
                <input type="date" id="aDt" min="2020-01-01" max="2026-12-31"/>
            </div>
        </div>

        <div class="add-btn-wrap" style="gap: 0.8rem; display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="add-student-btn" onclick="addStudent()">⚡ Auto-Populate Students</button>
            <button class="add-student-btn" id="viewMonthlyBtn" style="background: linear-gradient(135deg,#0ea5e9,#0369a1); box-shadow: 0 4px 14px rgba(14,165,233,0.30);" onclick="viewMonthlyFromDate()">📋 View Monthly List</button>
        </div>

        <div class="add-msg" id="addMsg"></div>
    </div>

    <div class="table-card">
        <div class="table-toolbar">
            <div class="table-toolbar-title">Student Attendance List</div>
            <div class="toolbar-right">
                <button class="add-student-btn" style="padding: 6px 14px; font-size: 0.8rem; margin-right: 10px;" onclick="printAttendance()">🖨️ Print A4 Report</button>
                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterTable('All', this)">All</button>
                    <button class="filter-btn" onclick="filterTable('Present', this)">Present</button>
                    <button class="filter-btn" onclick="filterTable('Absent', this)">Absent</button>
                    <button class="filter-btn" onclick="filterTable('Not Marked', this)">Not Marked</button>
                </div>
                <span class="date-badge" id="dateBadge">No date</span>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Date</th>
                        <th>Mark Attendance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="atBody"></tbody>
            </table>
        </div>
    </div><!-- /table-card -->
    </div><!-- /dailyPanel -->

    <!-- ── MONTHLY PANEL ── -->
    <div id="monthlyPanel">

        <div class="monthly-controls">
            <div>
                <label for="mMonth">Select Month</label>
                <input type="month" id="mMonth" />
            </div>
            <button class="monthly-load-btn" onclick="loadMonthlyAttendance()">Load Register</button>
        </div>

        <div class="monthly-table-card">
            <div class="monthly-toolbar">
                <div class="monthly-toolbar-title" id="monthlyTitle">Monthly Attendance Register</div>
                <button class="add-student-btn" style="padding:6px 18px;font-size:0.8rem;" onclick="printMonthlyAttendance()">🖨️ Print A4</button>
            </div>
            <div class="monthly-wrap">
                <div id="monthlyTableContainer">
                    <div class="monthly-empty">Select a month and click "Load Register" to view attendance.</div>
                </div>
            </div>
