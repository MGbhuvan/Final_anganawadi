<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attendance - Poshan Abhiyan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple:     #A855F7;
            --deep-purple:#7C3AED;
            --saffron:    #FF6B00;
            --green:      #138808;
            --navy:       #141e30;
            --white:      #FFFFFF;
            --red:        #A32D2D;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: #f4f6fb;
        }

        .topbar {
            background: linear-gradient(135deg, var(--navy) 0%, #2d1b4e 100%);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 3px 16px rgba(0,0,0,0.18);
        }

        .topbar-left { display: flex; align-items: center; gap: 1rem; }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.75); text-decoration: none;
            font-size: 0.82rem; font-weight: 700;
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem; font-weight: 700; color: var(--white);
        }

        .topbar-right {
            font-size: 0.72rem; color: rgba(255,255,255,0.38);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        .tricolor {
            height: 4px;
            background: linear-gradient(90deg,
                var(--saffron) 0% 33%,
                var(--white)   33% 66%,
                var(--purple)  66% 100%
            );
        }

        .page {
            max-width: 1050px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem; margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--white); border-radius: 16px;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-top: 4px solid var(--purple);
            position: relative; overflow: hidden;
        }

        .stat-card::after {
            content: ''; position: absolute;
            right: -10px; top: -10px;
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(168,85,247,0.07);
        }

        .stat-card.green { border-top-color: var(--green); }
        .stat-card.green::after { background: rgba(19,136,8,0.07); }
        .stat-card.red   { border-top-color: #E24B4A; }
        .stat-card.red::after { background: rgba(226,75,74,0.07); }
        .stat-card.amber { border-top-color: #F5A623; }
        .stat-card.amber::after { background: rgba(245,166,35,0.07); }

        .stat-label {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: #9CA3AF; margin-bottom: 0.5rem;
        }

        .stat-val {
            font-size: 2rem; font-weight: 800;
            color: var(--navy); line-height: 1;
        }

        /* ADD CARD */
        .add-card {
            background: var(--white); border-radius: 18px;
            padding: 1.6rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            margin-bottom: 1.5rem;
            border: 1.5px solid #f3eeff;
        }

        .add-card-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
            margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 10px;
        }

        .add-card-title::before {
            content: ''; display: inline-block;
            width: 5px; height: 22px;
            background: linear-gradient(180deg, var(--purple), var(--deep-purple));
            border-radius: 3px;
        }

        /* Fields row */
        .add-fields {
            display: flex; gap: 1rem;
            align-items: flex-end; flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .add-field {
            display: flex; flex-direction: column; gap: 5px;
            flex: 1; min-width: 140px;
        }

        .add-field label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280;
        }

        .add-field input {
            padding: 9px 12px;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); background: #FAFAFA;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-field input:focus {
            border-color: var(--purple); background: var(--white);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.10);
        }

        .add-field input::placeholder { color: #D1D5DB; }

        .date-wrap {
            display: flex; align-items: center; gap: 10px;
            background: #faf8ff; border: 1.5px solid #ede9fe;
            border-radius: 10px; padding: 9px 14px;
            flex: 1; min-width: 180px;
        }

        .date-wrap label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280; white-space: nowrap;
        }

        .date-wrap input {
            border: none; background: transparent;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); outline: none;
        }

        /* ── CENTERED ADD BUTTON ── */
        .add-btn-wrap {
            display: flex;
            justify-content: center;
        }

        .add-student-btn {
            padding: 10px 40px;
            background: linear-gradient(135deg, var(--purple), var(--deep-purple));
            color: var(--white); border: none; border-radius: 12px;
            font-size: 0.92rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            box-shadow: 0 4px 14px rgba(168,85,247,0.30);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            letter-spacing: 0.04em;
        }

        .add-student-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168,85,247,0.40);
        }

        .add-student-btn:active { transform: translateY(0); }

        .add-msg {
            display: none; margin-top: 1rem;
            padding: 9px 14px; border-radius: 9px;
            font-size: 0.8rem; font-weight: 700; text-align: center;
        }

        .add-msg.success { display:block; background:#EAF3DE; color:#27500A; border:1px solid #C0DD97; }
        .add-msg.error   { display:block; background:#FCEBEB; color:#791F1F; border:1px solid #F7C1C1; }

        /* TABLE */
        .table-card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow: hidden;
        }

        .table-toolbar {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.6rem;
            border-bottom: 1px solid #F3F4F6;
            flex-wrap: wrap; gap: 0.8rem;
        }

        .table-toolbar-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
        }

        .toolbar-right {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }

        .filter-row { display: flex; gap: 6px; }

        .filter-btn {
            font-size: 0.72rem; padding: 4px 13px;
            border-radius: 20px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 700;
            border: 1.5px solid #E5E7EB;
            background: var(--white); color: #6B7280;
            transition: all 0.15s;
        }

        .filter-btn.active {
            background: var(--purple); color: var(--white);
            border-color: var(--purple);
        }

        .date-badge {
            font-size: 0.75rem; font-weight: 700;
            color: #581C87; background: #F3E8FF;
            padding: 4px 12px; border-radius: 20px;
        }

        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }

        thead tr {
            background: linear-gradient(135deg, var(--navy) 0%, #2d1b4e 100%);
        }

        thead th {
            color: rgba(255,255,255,0.85);
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 13px 15px; text-align: left; white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #F9FAFB;
            transition: background 0.15s;
            animation: rowIn 0.3s ease both;
        }

        @keyframes rowIn {
            from { opacity:0; transform:translateX(-8px); }
            to   { opacity:1; transform:translateX(0); }
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #faf8ff; }

        tbody td {
            padding: 12px 15px;
            color: #374151; vertical-align: middle;
        }

        .stu-id {
            display: inline-block; padding: 3px 9px;
            background: #F3E8FF; color: #581C87;
            border-radius: 6px; font-size: 0.75rem; font-weight: 700;
        }

        .stu-name { font-weight: 700; color: var(--navy); }

        /* ── SMALL Pre / Abs BUTTONS ── */
        .att-btns { display: flex; gap: 6px; }

        .att-btn {
            padding: 5px 12px;
            border-radius: 7px;
            font-size: 0.78rem; font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.18s;
            letter-spacing: 0.03em;
        }

        .att-btn.pre {
            background: #EAF3DE; color: #27500A;
            border-color: #C0DD97;
        }

        .att-btn.abs {
            background: #FCEBEB; color: #791F1F;
            border-color: #F7C1C1;
        }

        .att-btn.pre.active {
            background: var(--green); color: var(--white);
            border-color: var(--green);
            box-shadow: 0 2px 8px rgba(19,136,8,0.28);
        }

        .att-btn.abs.active {
            background: #E24B4A; color: var(--white);
            border-color: #E24B4A;
            box-shadow: 0 2px 8px rgba(226,75,74,0.28);
        }

        /* Status pill */
        .status-pill {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 0.72rem; font-weight: 700;
        }

        .sp-present   { background: #EAF3DE; color: #27500A; }
        .sp-absent    { background: #FCEBEB; color: #791F1F; }
        .sp-notmarked { background: #F3F4F6; color: #9CA3AF; }

        .del-btn {
            padding: 5px 13px;
            background: #FCEBEB; color: var(--red);
            border: 1px solid #F7C1C1; border-radius: 7px;
            font-size: 0.75rem; font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer; transition: background 0.2s;
        }

        .del-btn:hover { background: #F7C1C1; }

        .empty-state {
            text-align: center; padding: 3.5rem 2rem;
            color: #9CA3AF; font-size: 0.88rem;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 0.8rem; }

        .fixed-toast {
            display: none; position: fixed;
            bottom: 28px; right: 28px;
            padding: 12px 22px; border-radius: 12px;
            font-size: 0.84rem; font-weight: 700;
            color: var(--white); z-index: 9999;
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        @media (max-width: 900px) {
            .topbar {
                height: auto;
                padding: 0.75rem 1rem;
                align-items: flex-start;
                flex-direction: column;
                gap: 0.5rem;
            }
            .topbar-left {
                width: 100%;
                flex-wrap: wrap;
            }
            .topbar-right {
                width: 100%;
                text-align: left;
            }
            .table-toolbar,
            .toolbar-right {
                gap: 0.5rem;
                align-items: flex-start;
                flex-direction: column;
            }
            .filter-row {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 700px) {
            .stats-row  { grid-template-columns: 1fr 1fr; }
            .add-fields { flex-direction: column; }
            .date-wrap { width: 100%; }
            .page { padding: 1rem 1rem 3rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="home.html" class="back-btn">&#8592; Home</a>
        <div class="topbar-title">Attendance Module</div>
    </div>
    <div class="topbar-right">Poshan Abhiyan</div>
</div>
<div class="tricolor"></div>

<div class="fixed-toast" id="fixedToast"></div>

<div class="page">

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Students</div>
            <div class="stat-val" id="sTotal">0</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Present</div>
            <div class="stat-val" id="sPresent">0</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Absent</div>
            <div class="stat-val" id="sAbsent">0</div>
        </div>
        <div class="stat-card amber">
            <div class="stat-label">Attendance %</div>
            <div class="stat-val" id="sPct">0%</div>
        </div>
    </div>

    <div class="add-card">
        <div class="add-card-title">Add Student to Attendance</div>

        <div class="add-fields">
            <div class="add-field">
                <label>Student ID</label>
                <input type="text" id="aId" placeholder="e.g. STU001"/>
            </div>
            <div class="add-field">
                <label>Student Name</label>
                <input type="text" id="aNm" placeholder="Enter student name"/>
            </div>
            <div class="date-wrap">
                <label>Date</label>
                <input type="date" id="aDt"/>
            </div>
        </div>

        <!-- CENTERED BUTTON -->
        <div class="add-btn-wrap">
            <button class="add-student-btn" onclick="addStudent()">+ Add Student</button>
        </div>

        <div class="add-msg" id="addMsg"></div>
    </div>

    <div class="table-card">
        <div class="table-toolbar">
            <div class="table-toolbar-title">Student Attendance List</div>
            <div class="toolbar-right">
                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterTable('All', this)">All</button>
                    <button class="filter-btn" onclick="filterTable('Present', this)">Present</button>
                    <button class="filter-btn" onclick="filterTable('Absent', this)">Absent</button>
                    <button class="filter-btn" onclick="filterTable('Not Marked', this)">Not Marked</button>
                </div>
                <span class="date-badge" id="dateBadge">No date</span>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Date</th>
                        <th>Mark Attendance</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="atBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script type="module" src="js/shared/serverGuard.js"></script>
<script type="module" src="js/pages/attendance.page.js"></script>

</body>
</html>
