<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Details - Poshan Abhiyan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green:      #138808;
            --deep-green: #0a5e05;
            --saffron:    #FF6B00;
            --navy:       #141e30;
            --white:      #FFFFFF;
            --red:        #A32D2D;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: #f4f6fb;
        }

        .topbar {
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a2a 100%);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 3px 16px rgba(0,0,0,0.18);
        }

        .topbar-left { display: flex; align-items: center; gap: 1rem; }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.75); text-decoration: none;
            font-size: 0.82rem; font-weight: 700;
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem; font-weight: 700; color: var(--white);
        }

        .topbar-right {
            font-size: 0.72rem; color: rgba(255,255,255,0.38);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        .tricolor {
            height: 4px;
            background: linear-gradient(90deg,
                var(--saffron) 0% 33%,
                var(--white)   33% 66%,
                var(--green)   66% 100%
            );
        }

        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem; margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--white); border-radius: 16px;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-top: 4px solid var(--green);
            position: relative; overflow: hidden;
        }

        .stat-card::after {
            content: ''; position: absolute;
            right: -10px; top: -10px;
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(19,136,8,0.07);
        }

        .stat-card.blue   { border-top-color: #378ADD; }
        .stat-card.blue::after   { background: rgba(55,138,221,0.07); }
        .stat-card.orange { border-top-color: var(--saffron); }
        .stat-card.orange::after { background: rgba(255,107,0,0.07); }

        .stat-label {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: #9CA3AF; margin-bottom: 0.5rem;
        }

        .stat-val {
            font-size: 2rem; font-weight: 800;
            color: var(--navy); line-height: 1;
        }

        /* FORM CARD */
        .form-card {
            background: var(--white); border-radius: 18px;
            padding: 1.8rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            margin-bottom: 1.5rem;
            border: 1.5px solid #e8f5e9;
        }

        .form-card-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
            margin-bottom: 1.3rem;
            display: flex; align-items: center; gap: 10px;
        }

        .form-card-title::before {
            content: ''; display: inline-block;
            width: 5px; height: 22px;
            background: linear-gradient(180deg, var(--green), var(--saffron));
            border-radius: 3px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem; margin-bottom: 1.2rem;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field.full-width { grid-column: 1 / -1; }

        .field label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6B7280;
        }

        .field input,
        .field select,
        .field textarea {
            padding: 9px 12px;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            font-size: 0.88rem; font-family: 'Nunito', sans-serif;
            color: var(--navy); background: #FAFAFA;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field textarea {
            resize: vertical;
            min-height: 72px;
        }

        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--green); background: var(--white);
            box-shadow: 0 0 0 3px rgba(19,136,8,0.10);
        }

        .field input.input-error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(163,45,45,0.12);
        }

        .field input::placeholder { color: #D1D5DB; }

        /* Student ID prefix wrapper */
        .id-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            background: #FAFAFA;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .id-wrapper:focus-within {
            border-color: var(--green); background: var(--white);
            box-shadow: 0 0 0 3px rgba(19,136,8,0.10);
        }

        .id-prefix {
            padding: 9px 10px 9px 12px;
            font-size: 0.88rem; font-weight: 800;
            font-family: 'Nunito', sans-serif;
            color: var(--green);
            background: #EAF3DE;
            border-right: 1.5px solid #E5E7EB;
            white-space: nowrap;
            user-select: none;
        }

        .id-wrapper input {
            border: none; border-radius: 0;
            background: transparent;
            box-shadow: none !important;
            flex: 1;
        }

        .id-wrapper input:focus {
            border: none;
            box-shadow: none !important;
        }

        /* Form actions — centered */
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .clear-btn {
            padding: 10px 22px;
            background: #F3F4F6; color: #6B7280;
            border: none; border-radius: 10px;
            font-size: 0.88rem; font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer; transition: background 0.2s;
        }

        .clear-btn:hover { background: #E5E7EB; }

        .save-btn {
            padding: 10px 36px;
            background: linear-gradient(135deg, var(--green), var(--deep-green));
            color: var(--white); border: none; border-radius: 10px;
            font-size: 0.88rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            box-shadow: 0 4px 12px rgba(19,136,8,0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(19,136,8,0.36);
        }

        .save-btn:active { transform: translateY(0); }

        .toast-msg {
            display: none; margin-top: 1rem;
            padding: 10px 16px; border-radius: 10px;
            font-size: 0.82rem; font-weight: 700; text-align: center;
        }

        .toast-msg.success { display:block; background:#EAF3DE; color:#27500A; border:1px solid #C0DD97; }
        .toast-msg.error   { display:block; background:#FCEBEB; color:#791F1F; border:1px solid #F7C1C1; }

        /* TABLE */
        .table-card {
            background: var(--white); border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow: hidden;
        }

        .table-toolbar {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.6rem;
            border-bottom: 1px solid #F3F4F6;
        }

        .table-toolbar-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
        }

        .rec-badge {
            font-size: 0.75rem; font-weight: 700;
            color: #27500A; background: #EAF3DE;
            padding: 4px 12px; border-radius: 20px;
        }

        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }

        thead tr {
            background: linear-gradient(135deg, var(--navy) 0%, #1a3a2a 100%);
        }

        thead th {
            color: rgba(255,255,255,0.85);
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 13px 15px; text-align: left; white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #F9FAFB;
            transition: background 0.15s;
            animation: rowIn 0.3s ease;
        }

        @keyframes rowIn {
            from { opacity:0; transform:translateX(-8px); }
            to   { opacity:1; transform:translateX(0); }
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #F0FFF4; }

        tbody td {
            padding: 12px 15px;
            color: #374151; vertical-align: middle;
        }

        .stu-id {
            display: inline-block; padding: 3px 9px;
            background: #EAF3DE; color: #27500A;
            border-radius: 6px; font-size: 0.75rem; font-weight: 700;
        }

        .stu-name { font-weight: 700; color: var(--navy); }

        .gender-pill {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 0.72rem; font-weight: 700;
        }

        .gp-male   { background: #E6F1FB; color: #0C447C; }
        .gp-female { background: #FBEAF0; color: #72243E; }
        .gp-other  { background: #F3E8FF; color: #581C87; }

        /* Three-dot action menu */
        .action-cell {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .menu-btn {
            background: #F3F4F6; border: 1.5px solid #E5E7EB;
            font-size: 1.1rem; cursor: pointer;
            color: #6B7280; width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .menu-btn:hover { background: #E5E7EB; color: var(--navy); border-color: #D1D5DB; }

        .action-menu {
            display: none;
            position: absolute;
            right: 15px; top: 100%;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #E5E7EB;
            min-width: 140px;
            z-index: 1000;
            overflow: hidden;
            margin-top: 5px;
            animation: menuIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes menuIn {
            from { opacity:0; transform:translateY(-6px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .action-menu.open { display: block; }

        .action-menu button {
            display: flex; align-items: center; gap: 8px;
            width: 100%; padding: 10px 16px;
            background: none; border: none;
            font-size: 0.82rem; font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer; text-align: left;
            transition: background 0.15s;
        }

        .action-menu button.update-opt { color: #0C447C; }
        .action-menu button.update-opt:hover { background: #E6F1FB; }
        .action-menu button.delete-opt { color: var(--red); }
        .action-menu button.delete-opt:hover { background: #FCEBEB; }

        .empty-state {
            text-align: center; padding: 3.5rem 2rem;
            color: #9CA3AF; font-size: 0.88rem;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 0.8rem; }

        .fixed-toast {
            display: none; position: fixed;
            bottom: 28px; right: 28px;
            padding: 12px 22px; border-radius: 12px;
            font-size: 0.84rem; font-weight: 700;
            color: var(--white); z-index: 9999;
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* UPDATE MODAL */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.38);
            z-index: 500;
            align-items: center; justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            width: 100%; max-width: 560px;
            margin: 1rem;
            box-shadow: 0 16px 48px rgba(0,0,0,0.22);
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { opacity:0; transform:scale(0.96) translateY(16px); }
            to   { opacity:1; transform:scale(1) translateY(0); }
        }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.4rem;
        }

        .modal-title {
            font-size: 1rem; font-weight: 800; color: var(--navy);
            display: flex; align-items: center; gap: 8px;
        }

        .modal-title::before {
            content: ''; display: inline-block;
            width: 4px; height: 20px;
            background: linear-gradient(180deg, #378ADD, #0C447C);
            border-radius: 3px;
        }

        .modal-close {
            background: none; border: none; font-size: 1.4rem;
            cursor: pointer; color: #9CA3AF;
            line-height: 1; padding: 2px 6px;
            border-radius: 6px; transition: background 0.15s;
        }

        .modal-close:hover { background: #F3F4F6; color: var(--navy); }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem; margin-bottom: 1.2rem;
        }

        .modal-actions {
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .update-btn {
            padding: 10px 32px;
            background: linear-gradient(135deg, #378ADD, #0C447C);
            color: var(--white); border: none; border-radius: 10px;
            font-size: 0.88rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer;
            box-shadow: 0 4px 12px rgba(12,68,124,0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(12,68,124,0.36);
        }

        @media (max-width: 900px) {
            .topbar {
                height: auto;
                padding: 0.75rem 1rem;
                align-items: flex-start;
                flex-direction: column;
                gap: 0.5rem;
            }
            .topbar-left {
                width: 100%;
                flex-wrap: wrap;
            }
            .topbar-right {
                width: 100%;
                text-align: left;
            }
            .table-toolbar {
                gap: 0.5rem;
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr; }
            .form-grid, .modal-grid  { grid-template-columns: 1fr; }
            .page { padding: 1rem 1rem 3rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="home.html" class="back-btn">&#8592; Home</a>
        <div class="topbar-title">Student Details Module</div>
    </div>
    <div class="topbar-right">Poshan Abhiyan</div>
</div>
<div class="tricolor"></div>

<div class="fixed-toast" id="fixedToast"></div>

<!-- UPDATE MODAL -->
<div class="modal-overlay" id="updateModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Update Student Record</div>
            <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
        </div>
        <div class="modal-grid">
            <div class="field">
                <label>Student ID (read-only)</label>
                <input type="text" id="mId" readonly style="background:#F3F4F6; color:#6B7280; cursor:not-allowed;"/>
            </div>
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="mNm" placeholder="Student full name"/>
            </div>
            <div class="field">
                <label>Parent's Name</label>
                <input type="text" id="mPn" placeholder="Father / Mother name"/>
            </div>
            <div class="field">
                <label>Gender</label>
                <select id="mGn">
                    <option value="">-- Select Gender --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Date of Birth (2020–2026)</label>
                <input type="date" id="mDob" min="2020-01-01" max="2026-12-31"/>
            </div>
            <div class="field">
                <label>Aadhar Card Number (12 digits)</label>
                <input type="text" id="mAadhaar" maxlength="12" placeholder="e.g. 123456789012"/>
            </div>
            <div class="field full-width">
                <label>Address</label>
                <textarea id="mAddr" placeholder="Full residential address"></textarea>
            </div>
        </div>
        <div class="modal-actions">
            <button class="clear-btn" onclick="closeModal()">Cancel</button>
            <button class="update-btn" onclick="submitUpdate()">Update Record</button>
        </div>
        <div class="toast-msg" id="modalToast"></div>
    </div>
</div>

<div class="page">

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Students</div>
            <div class="stat-val" id="sTotal">0</div>
        </div>
        <div class="stat-card blue">
            <div class="stat-label">Boys</div>
            <div class="stat-val" id="sBoys">0</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-label">Girls</div>
            <div class="stat-val" id="sGirls">0</div>
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">
        <div class="form-card-title">Register New Student</div>

        <div class="form-grid">
            <!-- Student ID with STUD prefix -->
            <div class="field">
                <label>Student ID</label>
                <div class="id-wrapper">
                    <span class="id-prefix">STUD</span>
                    <input type="text" id="fId" placeholder="e.g. 001" inputmode="numeric"/>
                </div>
            </div>
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="fNm" placeholder="Student full name"/>
            </div>
            <div class="field">
                <label>Parent's Name</label>
                <input type="text" id="fPn" placeholder="Father / Mother name"/>
            </div>
            <div class="field">
                <label>Gender</label>
                <select id="fGn">
                    <option value="">-- Select Gender --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Date of Birth (2020–2026)</label>
                <input type="date" id="fDob" min="2020-01-01" max="2026-12-31"/>
            </div>
            <div class="field">
                <label>Aadhar Card Number (12 digits)</label>
                <input type="text" id="fAadhaar" maxlength="12" placeholder="e.g. 123456789012" inputmode="numeric"/>
            </div>
            <div class="field full-width">
                <label>Address</label>
                <textarea id="fAddr" placeholder="Full residential address"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button class="clear-btn" onclick="clearForm()">Clear</button>
            <button class="save-btn"  onclick="saveRecord()">Save Record</button>
        </div>

        <div class="toast-msg" id="toastMsg"></div>
    </div>

    <!-- TABLE CARD -->
    <div class="table-card">
        <div class="table-toolbar">
            <div class="table-toolbar-title">All Records</div>
            <span class="rec-badge" id="recBadge">0 records</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Full Name</th>
                        <th>Parent's Name</th>
                        <th>Date of Birth</th>
                        <th>Gender</th>
                        <th>Aadhar</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="stBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script type="module" src="js/shared/serverGuard.js"></script>
<script type="module" src="js/pages/student.page.js"></script>

</body>
</html>
